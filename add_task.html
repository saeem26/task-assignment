<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add Task</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<h1>Add New Task</h1>
<a href="add_employee.html" style="position: absolute; top: 20px; right: 20px; text-decoration: none; color: #667eea; font-weight: bold;">Back to Add Employee</a>

<div class="container">

    <div class="task-box">
        <h3>Add Task</h3>
        <form id="addTaskForm">
            <input type="text" id="taskDescription" placeholder="Enter Task Description" required>
            <input type="text" id="employeeName" placeholder="Assign to Employee" list="employees" required>
            <datalist id="employees">
            </datalist>
            <button type="submit">Add Task</button>
        </form>
        <div id="message" style="margin-top: 10px; display: none;"></div>
        <p style="margin-top: 20px;"><a href="dashboard.html" style="text-decoration: none; color: #667eea; font-weight: bold;">Go to Dashboard</a></p>
    </div>

    <div class="employee-box">
        <h3>Employee Availability</h3>
        <ul id="employeeAvailabilityList"></ul>
    </div>

</div>

<script src="add_task.js"></script>
</body>
</html>
